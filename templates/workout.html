    <!DOCTYPE html>

    <meta charset="UTF-8">

    <title>EatForFit | Workout</title>
</head>

<body>
    <div class="container">
        <nav>
            <a href="/dashboard">แดชบอร์ด</a>
            <a href="/food_log">บันทึกสารอาหาร</a>
            <a href="/workout">ตารางออกกำลังกาย</a>
            <a href="/profile">โปรไฟล์</a>
        </nav>

        <div class="card" style="padding: 50px 30px;">
            <div style="font-size: 60px; margin-bottom: 20px;"></div>
            
            <h2 class="form-title">ระบบกำลังพัฒนา</h2>
            
            <p style="color: #666; line-height: 1.8;">
                ขออภัยในความไม่สะดวกครับ <br>
                ฟีเจอร์ <b>"บันทึกการออกกำลังกาย"</b> กำลังอยู่ในช่วงปรับปรุง <br>
                เพื่อให้คุณได้รับประสบการณ์ที่ดีที่สุดในการใช้งาน
            </p>

            <div style="margin-top: 30px; padding: 15px; background: #FFF9FB; border-radius: 20px; border: 1px dashed #FF6BA9;">
                <p style="color: #FF6BA9; font-size: 14px;">
                    เตรียมพบกับระบบบันทึกท่าออกกำลังกาย <br> เร็วๆ นี้
                </p>
            </div>

            <div class="btn-group">
                <a href="/dashboard" class="btsubmit" style="text-decoration: none; display: inline-block;">กลับไปหน้าหลัก</a>
            </div>
        </div>
    </div>
</body>

</html>
