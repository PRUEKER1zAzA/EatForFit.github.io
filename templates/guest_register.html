<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='/img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/eatforfit.css') }}">
    <title>EatForFit | Guest Register</title>
</head>
<body>
    <div class="card">
        <form action="/guest_resubmit" method="POST">
            <h1 class="form-title" style="text-align: center;">สมัครสมาชิก</h1>

            <div class="form-group">
                <label>ชื่อเล่น 
                    {% if error %}<span style="color: red; font-size: 12px; margin-left: 10px;">* {{ error }}</span>{% endif %}
                </label>
                <input class="tb" type="text" name="username" placeholder="ตั้งชื่อเล่นของคุณ" required>
            </div>

            <div class="form-group">
                <label>รหัสผ่าน</label>
                <input class="tb" type="password" name="password" placeholder="ตั้งรหัสผ่าน" required>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>เพศ</label>
                    <select class="tb" name="gender" required>
                        <option value="male">ชาย</option>
                        <option value="female">หญิง</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>อายุ (ปี)</label>
                    <input class="tb" type="number" name="age" placeholder="อายุ" required>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <div class="form-group">
                    <label>น้ำหนัก (กก.)</label>
                    <input class="tb" type="number" name="weight" placeholder="60" step="0.1" required>
                </div>
                <div class="form-group">
                    <label>ส่วนสูง (ซม.)</label>
                    <input class="tb" type="number" name="height" placeholder="170" step="0.1" required>
                </div>
            </div>

            <div class="form-group">
                <label>กิจกรรม</label>
                <select class="tb" name="activity" required>
                    <option value="sedentary">ไม่ออกกำลังกายเลย</option>
                    <option value="light">เบา 1-2 วัน/สัปดาห์</option>
                    <option value="moderate">ปานกลาง 3-5 วัน/สัปดาห์</option>
                    <option value="heavy">หนัก 6-7 วัน/สัปดาห์</option>
                    <option value="athlete">นักกีฬา 2x/วัน</option>
                </select>
            </div>

            <div class="form-group">
                <label>เปอร์เซ็นต์ไขมัน - ถ้าไม่ทราบให้ใส่ค่าประมาณ</label>
                <input class="tb" type="number" name="bodyfat" placeholder="15" required>
            </div>

            <div class="btn-group" style="margin-top: 20px;">
                <button class="btreset" type="reset">ล้าง</button>
                <button class="btsubmit" type="submit">ยืนยันการสมัคร</button>
            </div>
        </form>
    </div>
</body>
</html>
