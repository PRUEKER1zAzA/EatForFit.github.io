<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='/img/logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/eatforfit.css') }}">
    <title>EatForFit | Edit Food</title>
</head>

<body>
    <div style="margin-top: 30px; text-align: left; max-width: 500px; margin-left: auto; margin-right: auto;">
        <a href="/admin" style="text-decoration: none; color: #FF6BA9; font-size: 14px;">← กลับไปหน้าจัดการ</a>
    </div>
    <div class="container">
        <nav>
            <a href="/dashboard">แดชบอร์ด</a>
            <a href="/food_log">บันทึกสารอาหาร</a>
            <a href="/workout">ตารางออกกำลังกาย</a>
            <a href="/profile">โปรไฟล์</a>
        </nav>

        <div class="card">
            <h1 class="page-title" style="margin-top: 0;">แก้ไขเมนูอาหาร</h1>
            <form method="post" class="form-container">
                <div class="form-group">
                    <label>ชื่ออาหาร</label>
                    <input class="tb" type="text" name="food_name" value="{{ food.food_name or '' }}"
                        placeholder="ชื่ออาหาร">
                </div>
                <div class="form-group">
                    <label>คาร์โบไฮเดรต (g)</label>
                    <input class="tb" type="number" step="0.1" name="carb" id="carb" value="{{ food.carb or '' }}"
                        oninput="autoCal()">
                </div>
                <div class="form-group">
                    <label>โปรตีน (g)</label>
                    <input class="tb" type="number" step="0.1" name="protein" id="protein"
                        value="{{ food.protein or '' }}" oninput="autoCal()">
                </div>
                <div class="form-group">
                    <label>ไขมัน (g)</label>
                    <input class="tb" type="number" step="0.1" name="fat" id="fat" value="{{ food.fat or '' }}"
                        oninput="autoCal()">
                </div>
                <div class="form-group">
                    <label>แคลอรี่รวม</label>
                    <input class="tb" type="number" name="calories" id="calories" value="{{ food.calories or '' }}"
                        readonly style="background: #f0f0f0;">
                </div>

                <div class="form-actions">
                    <button class="btsubmit" type="submit">บันทึกการเปลี่ยนแปลง</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function autoCal() {
            let carb = parseFloat(document.getElementById("carb").value) || 0;
            let protein = parseFloat(document.getElementById("protein").value) || 0;
            let fat = parseFloat(document.getElementById("fat").value) || 0;
            document.getElementById("calories").value = Math.round((carb * 4) + (protein * 4) + (fat * 9));
        }
    </script>
</body>

</html>
